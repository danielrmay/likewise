name: docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  MDBOOK_VERSION: 0.5.2
  MDBOOK_MERMAID_VERSION: 0.17.0
  MDBOOK_PAGETOC_VERSION: 0.3.0
  MDBOOK_LINKCHECK_VERSION: 0.7.7

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook + preprocessors
        run: |
          dl_tar() {
            curl -sSL "$1" | tar -xz -C "$RUNNER_TEMP"
          }
          dl_tar "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          dl_tar "https://github.com/badboy/mdbook-mermaid/releases/download/v${MDBOOK_MERMAID_VERSION}/mdbook-mermaid-v${MDBOOK_MERMAID_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          dl_tar "https://github.com/slowsage/mdbook-pagetoc/releases/download/v${MDBOOK_PAGETOC_VERSION}/mdbook-pagetoc-v${MDBOOK_PAGETOC_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          curl -sSL -o /tmp/linkcheck.zip \
            "https://github.com/Michael-F-Bryan/mdbook-linkcheck/releases/download/v${MDBOOK_LINKCHECK_VERSION}/mdbook-linkcheck.x86_64-unknown-linux-gnu.zip"
          unzip -o /tmp/linkcheck.zip -d "$RUNNER_TEMP"
          chmod +x "$RUNNER_TEMP/mdbook-linkcheck"
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"

      - name: Check links
        run: mdbook-linkcheck --standalone

      - name: Build
        run: mdbook build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
