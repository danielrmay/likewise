[book]
title = "Likewise"
description = "A protocol for decentralized personal knowledge graphs."
authors = ["Daniel May"]
language = "en"
src = "docs"

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
no-section-label = false
additional-css = ["theme/likewise.css"]
additional-js = ["mermaid.min.js", "mermaid-init.js"]
site-url = "/spec/"
git-repository-url = "https://github.com/danielrmay/likewise"
git-repository-icon = "fa-github"
edit-url-template = "https://github.com/danielrmay/likewise/edit/main/{path}"

[preprocessor.mermaid]
command = "mdbook-mermaid"
